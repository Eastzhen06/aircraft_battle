<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>飞机大战 - OS2 终极架构 v4.0</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="start-screen" class="screen os2-panel">
        <div class="title-container">
            <h1 class="game-title">飞机大战</h1>
            <p class="subtitle">OS2 指尖长空</p>
        </div>
        
        <div class="plane-selector">
            <p style="color:#00d4ff; margin-bottom:5px; font-size: 1.2em;">挂载机型: <span id="selected-plane-name" style="font-weight:bold; color:white; text-shadow: 0 0 5px #fff;">游骑兵</span></p>
            <p style="color:#00FF44; margin-bottom:10px; font-size: 1.1em;">辅助僚机: <span id="selected-wingman-name" style="font-weight:bold; color:white; text-shadow: 0 0 5px #fff;">无僚机</span></p>
        </div>

        <div id="admin-debug-panel" class="debug-panel" style="margin-top: 10px; border: 1px solid #00d4ff; padding: 15px; border-radius: 8px; background: rgba(0,212,255,0.05); width: 80%; max-width: 400px;">
            <p style="font-size:12px; color:#00d4ff; margin-bottom:10px; text-align: center; letter-spacing: 2px;">-- 机甲终端配置 --</p>
            <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;">
                <button class="plane-btn active" data-type="Ranger">游骑兵</button>
                <button class="plane-btn" data-type="Interceptor">拦截者</button>
                <button class="plane-btn" data-type="Fortress">重装堡垒</button>
                <button class="plane-btn" data-type="VoidBomber">虚空轰炸机</button>
            </div>
            
            <p style="font-size:12px; color:#00FF44; margin-top:15px; margin-bottom:10px; text-align: center; letter-spacing: 2px;">-- 僚机系统挂载 --</p>
            <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;">
                <button class="wingman-btn active" data-type="none">无僚机</button>
                <button class="wingman-btn" data-type="defensive">防御盾卫</button>
                <button class="wingman-btn" data-type="offensive">侧翼火力</button>
                <button class="wingman-btn" data-type="magnetic">引力磁枢</button>
            </div>
        </div>
        
        <button id="start-btn" class="btn primary" style="margin-top: 20px; font-size: 1.5em; padding: 15px 40px;">进入作战中心</button>
    </div>

    <div id="campaign-screen" class="screen hidden os2-panel">
        <h2 style="color: #00d4ff; margin-bottom: 20px; text-shadow: 0 0 10px #00d4ff;">选择作战宙域</h2>
        <div class="campaign-content">
            <div id="level-grid" class="level-grid"></div>
            <div class="level-details os2-panel">
                <h3 id="level-name" style="color: #fff;">建立连接...</h3>
                <p id="level-desc" style="color: #aaa; margin: 20px 0; line-height: 1.5;">请从左侧矩阵选择目标空域。</p>
                <button id="launch-level-btn" class="btn primary" style="display: none; width: 100%; font-size: 1.2em;">部署出击</button>
                <button id="back-to-menu-btn" class="btn secondary" style="margin-top: 15px; width: 100%;">断开并返回首页</button>
            </div>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <canvas id="gameCanvas"></canvas>
        <div id="debug-wrapper" class="debug-wrapper os2-panel">
            <canvas id="debugCanvas"></canvas>
            <div id="debug-info" class="debug-info">
                <span id="fps-display">FPS: 0</span> | <span id="gesture-display">动作: IDLE</span>
            </div>
            <button id="debug-toggle-btn" class="toggle-tab">◀</button>
        </div>

        <button id="pause-btn" class="btn icon-btn" style="position: absolute; top: 15px; left: 15px; z-index: 1000; padding: 10px;">⏸️</button>

        <div id="pause-screen" class="screen hidden os2-panel">
            <h2 style="color: #00d4ff; text-shadow: 0 0 20px #00d4ff; font-size: 3em;">系统已挂起</h2>
            <div class="pause-menu" style="display: flex; flex-direction: column; gap: 10px; margin-top: 30px;">
                <button id="resume-btn" class="btn primary">恢复执行</button>
                <button id="restart-btn-pause" class="btn warning">重新加载环境</button>
                <button id="menu-btn-pause" class="btn secondary">强制断开连接</button>
            </div>
        </div>

        <div id="hud" class="hidden">
            <div class="hud-left">
                <div class="hud-item"><span class="hud-label">关卡</span><span id="level-display" class="hud-value" style="color: #ffaa00;">1</span></div>
                <div class="hud-item"><span class="hud-label">积分</span><span id="score" class="hud-value">0</span></div>
            </div>
            <div class="hud-right">
                <div class="hud-item" style="justify-content: flex-end;">
                    <span id="lives-count" class="hud-value" style="color: #ff4444; font-size: 24px;">❤️ x 3</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label">生命值</span>
                    <div id="health-bar" class="health-bar"><div id="health-fill" class="health-fill"></div></div>
                </div>
                 <div class="hud-item">
                    <div id="shield-icon-container">
                        <span class="hud-label">保护罩</span>
                        <span id="shield-count" class="hud-value" style="color: #00d4ff;">🛡️ x 3</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="ult-container" class="hidden os2-panel">
            <div id="ult-fill"></div>
            <span id="ult-text">0%</span>
        </div>
    </div>
    <script type="module" src="js/game.js"></script>
</body>
</html>
