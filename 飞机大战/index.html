<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>飞机大战 - 手势控制 MVP</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 新增调试面板样式 */
        .debug-panel {
            margin-top: 20px;
            padding: 15px;
            border: 1px dashed #00d4ff;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.6);
            text-align: center;
        }
        .plane-btn {
            margin: 5px;
            padding: 8px 15px;
            font-size: 14px;
            background: #333;
            border: 1px solid #666;
            color: #fff;
            cursor: pointer;
        }
        .plane-btn:hover, .plane-btn.active {
            background: #00d4ff;
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <div id="account-icon">👤</div>
        
        <div class="title-container">
            <h1 class="game-title">飞机大战</h1>
            <p class="subtitle">手势控制版</p>
        </div>
        
        <div class="plane-selector">
            <p style="color:#00d4ff; margin-bottom:10px;">当前机型: <span id="selected-plane-name" style="font-weight:bold; color:white;">游骑兵</span></p>
        </div>

        <div id="admin-debug-panel" class="debug-panel hidden">
            <p style="font-size:12px; color:#aaa; margin-bottom:5px;">-- 开发者调试模式 --</p>
            <button class="plane-btn active" data-type="Ranger">游骑兵 (普通)</button>
            <button class="plane-btn" data-type="Interceptor">拦截者 (扇形)</button>
            <button class="plane-btn" data-type="Fortress">重装堡垒 (穿透)</button>
            <button class="plane-btn" data-type="VoidBomber">虚空轰炸 (直射)</button>
        </div>

        <div class="menu-container">
            <button id="start-btn" class="menu-btn">开始游戏</button>
        </div>

        <div id="dev-modal" class="modal screen hidden">
            <div class="modal-content">
                <h2 class="modal-title">开发者登录</h2>
                <div class="input-group">
                    <label>账号</label>
                    <input type="text" id="login-account" placeholder="输入 0001">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="输入 1011">
                </div>
                <button id="login-submit-btn" class="menu-btn">登录</button>
                <button id="dev-modal-close-btn" class="menu-btn secondary" style="margin-top: 10px;">关闭</button>
            </div>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <canvas id="gameCanvas"></canvas>
        <canvas id="debugCanvas"></canvas> 
        <button id="pause-btn">⏸️</button>

        <div id="pause-screen" class="screen hidden">
             <div class="pause-content">
                <h2>游戏暂停</h2>
                <div class="pause-buttons">
                    <button id="resume-btn" class="menu-btn">继续游戏</button>
                    <button id="restart-btn-pause" class="menu-btn secondary">重新开始</button>
                    <button id="menu-btn-pause" class="menu-btn secondary">返回主菜单</button>
                </div>
            </div>
        </div>

         <div id="hud" class="hidden">
            <div class="hud-left">
                <div class="hud-item"><span class="hud-label">SCORE</span><span id="score" class="hud-value">0</span></div>
            </div>
            <div class="hud-right">
                <div class="hud-item">
                    <span class="hud-label">HP</span>
                    <div id="health-bar" class="health-bar"><div id="health-fill" class="health-fill"></div></div>
                </div>
                 <div class="hud-item">
                    <div id="shield-icon-container">
                        <span class="hud-label">SHIELD</span>
                        <span id="shield-count" class="hud-value" style="color: #00d4ff;">🛡️ x 3</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="js/game.js"></script>
</body>
</html>
